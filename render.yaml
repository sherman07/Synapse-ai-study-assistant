services:
  - type: web
    runtime: python
    name: synapse-ai-backend
    region: oregon
    plan: free
    branch: main
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SYNAPSE_PUBLIC_BACKEND_URL
        value: https://synapse-ai-backend-idnc.onrender.com
      - key: SYNAPSE_CORS_ALLOW_ORIGINS
        value: https://synapse-ai-study-assistant-tutor.vercel.app
      - key: SYNAPSE_CORS_ALLOW_ORIGIN_REGEX
        value: ^https://synapse-ai-study-assistant-tutor(?:-[a-z0-9]+)?\.vercel\.app$
      - key: SYNAPSE_FRONTEND_BASE_URL
        value: https://synapse-ai-study-assistant-tutor.vercel.app/frontend
      - key: SUPABASE_URL
        value: https://yoopvoutgfhnldhmqmip.supabase.co
      - key: SUPABASE_ANON_KEY
        value: sb_publishable_WhUSmLHyEZ7E_-R9_sjbPA_5KVgHzXF
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_TIMEOUT_SECONDS
        value: "45"
      - key: ANALYSIS_MAX_SECONDS
        value: "55"
      - key: CONTROLLED_OUTPUT_TOKENS
        value: "8000"
      - key: ENABLE_CONDITIONAL_NOTE_EXPANSION
        value: "false"
      - key: ENABLE_PDF_VISUAL_EXTRACTION
        value: "false"
      - key: MAX_UPLOAD_BYTES
        value: "104857600"
      - key: MAX_SOURCE_CHARS
        value: "90000"
      - key: ENABLE_LOCAL_PPTX_APP_RENDER
        value: "false"
      - key: ENABLE_SOURCE_PPTX_PREVIEW_RENDER
        value: "false"
      - key: ENABLE_PPTX_SLIDE_RENDER
        value: "false"
      - key: ENABLE_PPTX_SVG_FALLBACK_RENDER
        value: "false"
      - key: ENABLE_PPTX_EMBEDDED_IMAGE_EXTRACTION
        value: "false"
      - key: SYNAPSE_DATA_API_INTERNAL_URL
        value: https://synapse-data-api.onrender.com
      - key: SYNAPSE_INTERNAL_API_TOKEN
        sync: false
      - key: SYNAPSE_SMTP_HOST
        sync: false
      - key: SYNAPSE_SMTP_PORT
        value: "2525"
      - key: SYNAPSE_SMTP_SECURITY
        value: starttls
      - key: SYNAPSE_SMTP_USERNAME
        sync: false
      - key: SYNAPSE_SMTP_PASSWORD
        sync: false
      - key: SYNAPSE_SMTP_FROM_EMAIL
        sync: false
      - key: SYNAPSE_SMTP_FROM_NAME
        value: Synapse

  - type: web
    runtime: node
    name: synapse-data-api
    region: oregon
    plan: free
    branch: main
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SYNAPSE_DATA_CORS_ORIGINS
        value: https://synapse-ai-study-assistant-tutor.vercel.app
      - key: ALLOW_LOCAL_DEMO_AUTH
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DB_SCHEMA
        value: public
      - key: SYNAPSE_INTERNAL_API_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
