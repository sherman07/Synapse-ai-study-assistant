<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Synapse</title>
  <meta name="description" content="Create a Synapse account to organise study materials into AI notes, mind maps, practice questions, and active recall workflows." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#4a7cff" />
  <script src="theme-bootstrap.js?v=theme-system-v1"></script>
  <meta property="og:title" content="Sign Up | Synapse" />
  <meta property="og:description" content="Start an active learning workspace with Synapse." />
  <meta property="og:image" content="/logos/synapse.png" />
  <meta name="twitter:card" content="summary" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="apple-touch-icon" href="/logos/synapse.png">
  <link rel="stylesheet" href="landing-auth.css?v=supabase-signup-v5">
  <link rel="stylesheet" href="synapse-selects.css?v=synapse-selects-v3">
  <link rel="stylesheet" href="styles/00-theme.css?v=theme-system-v1">
  <link rel="stylesheet" href="styles/99-dark-mode.css?v=dark-mode-v4">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card auth-card-wide">
      <a href="landing.html" class="auth-back-link">
        <i class="bi bi-arrow-left"></i>
        Back to home
      </a>
      
      <div class="auth-header">
        <img src="/logos/synapse.png" alt="Synapse" class="auth-logo">
        <h1>Create your account</h1>
        <p>Start your journey to active learning</p>
      </div>
      
      <form class="auth-form" id="signupForm">
        <div class="auth-form-row-2">
          <div class="auth-form-group">
            <label for="firstName" class="auth-label">
              <i class="bi bi-person"></i>
              First Name
            </label>
            <input 
              type="text" 
              id="firstName" 
              name="firstName" 
              class="auth-input" 
              placeholder="John"
              autocomplete="given-name"
              required
              aria-describedby="firstNameError"
              data-testid="signup-firstname-input"
            />
            <div class="auth-error" id="firstNameError" aria-live="polite"></div>
          </div>
          
          <div class="auth-form-group">
            <label for="lastName" class="auth-label">
              <i class="bi bi-person"></i>
              Last Name
            </label>
            <input 
              type="text" 
              id="lastName" 
              name="lastName" 
              class="auth-input" 
              placeholder="Doe"
              autocomplete="family-name"
              required
              aria-describedby="lastNameError"
              data-testid="signup-lastname-input"
            />
            <div class="auth-error" id="lastNameError" aria-live="polite"></div>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label for="signupEmail" class="auth-label">
            <i class="bi bi-envelope"></i>
            Email Address
          </label>
          <input 
            type="email" 
            id="signupEmail" 
            name="email" 
            class="auth-input" 
            placeholder="your.email@example.com"
            autocomplete="email"
            required
            aria-describedby="signupEmailError"
            data-testid="signup-email-input"
          />
          <div class="auth-error" id="signupEmailError" aria-live="polite"></div>
        </div>
        
        <div class="auth-form-group">
          <label for="role" class="auth-label">
            <i class="bi bi-mortarboard"></i>
            I am a...
          </label>
          <select id="role" name="role" class="auth-input" data-testid="signup-role-select">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
            <option value="professional">Professional Learner</option>
            <option value="other">Other</option>
          </select>
        </div>
        
        <div class="auth-form-row-2">
          <div class="auth-form-group">
            <label for="signupPassword" class="auth-label">
              <i class="bi bi-lock"></i>
              Password
            </label>
            <div class="auth-input-wrapper">
              <input 
                type="password" 
                id="signupPassword" 
                name="password" 
                class="auth-input" 
                placeholder="Create a password"
                autocomplete="new-password"
                required
                minlength="8"
                aria-describedby="signupPasswordHelp signupPasswordError"
                data-testid="signup-password-input"
              />
              <button type="button" class="auth-input-icon" id="toggleSignupPassword" aria-label="Show password" aria-pressed="false">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="auth-helper" id="signupPasswordHelp">At least 8 characters with a letter and number. Passwords are never stored by the Synapse frontend.</div>
            <div class="password-strength" id="signupPasswordStrength" aria-live="polite">
              <div class="password-strength-track" aria-hidden="true"><span></span></div>
              <span class="password-strength-label">Password strength: waiting</span>
            </div>
            <div class="password-requirements" id="signupPasswordRequirements" aria-label="Password requirements">
              <span data-rule="length"><i class="bi bi-circle"></i> 8+ characters</span>
              <span data-rule="letter"><i class="bi bi-circle"></i> One letter</span>
              <span data-rule="number"><i class="bi bi-circle"></i> One number</span>
            </div>
            <div class="auth-error" id="signupPasswordError" aria-live="polite"></div>
          </div>
          
          <div class="auth-form-group">
            <label for="confirmPassword" class="auth-label">
              <i class="bi bi-lock-fill"></i>
              Confirm Password
            </label>
            <div class="auth-input-wrapper">
              <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                class="auth-input" 
                placeholder="Re-enter password"
                autocomplete="new-password"
                required
                minlength="8"
                aria-describedby="confirmPasswordError"
                data-testid="signup-confirm-password-input"
              />
              <button type="button" class="auth-input-icon" id="toggleConfirmPassword" aria-label="Show confirmed password" aria-pressed="false">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="auth-error" id="confirmPasswordError" aria-live="polite"></div>
          </div>
        </div>
        
        <div class="auth-form-group">
          <label class="auth-checkbox auth-checkbox-terms">
            <input type="checkbox" name="terms" required data-testid="signup-terms-checkbox" />
            <span>I agree to the <a href="terms.html" class="auth-link">Terms of Service</a> and <a href="privacy.html" class="auth-link">Privacy Policy</a></span>
          </label>
          <div class="auth-error" id="termsError" aria-live="polite"></div>
        </div>

        <div class="auth-form-status" id="signupStatus" role="status" aria-live="polite"></div>
        
        <button type="submit" class="landing-btn landing-btn-primary landing-btn-block" data-testid="signup-submit-button">
          <i class="bi bi-person-plus"></i>
          <span>Create Account</span>
          <div class="auth-spinner" id="signupSpinner"></div>
        </button>
      </form>
      
      <div class="auth-divider">
        <span>or sign up with</span>
      </div>
      
      <button type="button" class="landing-btn landing-btn-outline landing-btn-block auth-social-btn" id="googleSignupBtn" data-testid="google-signup-button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.20443C17.64 8.56625 17.5827 7.95262 17.4764 7.36353H9V10.8449H13.8436C13.635 11.9699 13.0009 12.9231 12.0477 13.5613V15.8194H14.9564C16.6582 14.2526 17.64 11.9453 17.64 9.20443Z" fill="#4285F4"/>
          <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5613C11.2418 14.1013 10.2109 14.4204 9 14.4204C6.65591 14.4204 4.67182 12.8372 3.96409 10.71H0.957275V13.0418C2.43818 15.9831 5.48182 18 9 18Z" fill="#34A853"/>
          <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.82999 3.96409 7.28999V4.95817H0.957275C0.347727 6.17317 0 7.54772 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
          <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="auth-link">Login</a></p>
      </div>
    </div>
    
    <div class="auth-decoration">
      <div class="auth-decoration-circle auth-circle-1"></div>
      <div class="auth-decoration-circle auth-circle-2"></div>
      <div class="auth-decoration-circle auth-circle-3"></div>
      <div class="floating-particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js?v=public-auth-session-v3"></script>
  <script src="auth-client.js?v=public-auth-session-v3"></script>
  <script src="synapse-selects.js?v=synapse-selects-v3"></script>
  <script src="landing-auth.js?v=supabase-signup-backend-v5"></script>
</body>
</html>
