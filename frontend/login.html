<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Synapse</title>
  <meta name="description" content="Login to Synapse to continue turning study material into active learning notes, mind maps, questions, and teach-back practice." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#4a7cff" />
  <script src="theme-bootstrap.js?v=theme-system-v1"></script>
  <meta property="og:title" content="Login | Synapse" />
  <meta property="og:description" content="Continue your Synapse study workspace." />
  <meta property="og:image" content="/logos/synapse.png" />
  <meta name="twitter:card" content="summary" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="apple-touch-icon" href="/logos/synapse.png">
  <link rel="stylesheet" href="landing-auth.css?v=supabase-signup-v5">
  <link rel="stylesheet" href="synapse-selects.css?v=synapse-selects-v3">
  <link rel="stylesheet" href="styles/00-theme.css?v=theme-system-v2">
  <link rel="stylesheet" href="styles/99-dark-mode.css?v=dark-mode-v6">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <a href="landing.html" class="auth-back-link">
        <i class="bi bi-arrow-left"></i>
        Back to home
      </a>
      
      <div class="auth-header">
        <img src="/logos/synapse.png" alt="Synapse" class="auth-logo">
        <h1>Welcome back</h1>
        <p>Login to continue your learning journey</p>
      </div>
      
      <form class="auth-form" id="loginForm">
        <div class="auth-form-group">
          <label for="loginEmail" class="auth-label">
            <i class="bi bi-envelope"></i>
            Email Address
          </label>
          <input 
            type="email" 
            id="loginEmail" 
            name="email" 
            class="auth-input" 
            placeholder="your.email@example.com"
            autocomplete="email"
            required
            aria-describedby="emailError"
            data-testid="login-email-input"
          />
          <div class="auth-error" id="emailError" aria-live="polite"></div>
        </div>
        
        <div class="auth-form-group">
          <label for="loginPassword" class="auth-label">
            <i class="bi bi-lock"></i>
            Password
          </label>
          <div class="auth-input-wrapper">
            <input 
              type="password" 
              id="loginPassword" 
              name="password" 
              class="auth-input" 
              placeholder="Enter your password"
              autocomplete="current-password"
              required
              aria-describedby="passwordError"
              data-testid="login-password-input"
            />
            <button type="button" class="auth-input-icon" id="togglePassword" aria-label="Show password" aria-pressed="false">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="auth-helper">Uses hosted Supabase Auth when configured; passwords are never stored by the Synapse frontend.</div>
          <div class="auth-error" id="passwordError" aria-live="polite"></div>
        </div>
        
        <div class="auth-form-row">
          <label class="auth-checkbox">
            <input type="checkbox" id="rememberMe" name="remember" data-testid="remember-me-checkbox" />
            <span>Remember me</span>
          </label>
          <a href="forgot-password.html" class="auth-link">Forgot password?</a>
        </div>

        <div class="auth-form-status" id="loginStatus" role="status" aria-live="polite" data-testid="login-status"></div>
        
        <button type="submit" class="landing-btn landing-btn-primary landing-btn-block" data-testid="login-submit-button">
          <i class="bi bi-box-arrow-in-right"></i>
          <span>Login</span>
          <div class="auth-spinner" id="loginSpinner"></div>
        </button>
      </form>
      
      <div class="auth-divider">
        <span>or continue with</span>
      </div>
      
      <button type="button" class="landing-btn landing-btn-outline landing-btn-block auth-social-btn" id="googleLoginBtn" data-testid="google-login-button">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.20443C17.64 8.56625 17.5827 7.95262 17.4764 7.36353H9V10.8449H13.8436C13.635 11.9699 13.0009 12.9231 12.0477 13.5613V15.8194H14.9564C16.6582 14.2526 17.64 11.9453 17.64 9.20443Z" fill="#4285F4"/>
          <path d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5613C11.2418 14.1013 10.2109 14.4204 9 14.4204C6.65591 14.4204 4.67182 12.8372 3.96409 10.71H0.957275V13.0418C2.43818 15.9831 5.48182 18 9 18Z" fill="#34A853"/>
          <path d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.82999 3.96409 7.28999V4.95817H0.957275C0.347727 6.17317 0 7.54772 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
          <path d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html" class="auth-link">Sign up</a></p>
      </div>
    </div>
    
    <div class="auth-decoration">
      <div class="auth-decoration-circle auth-circle-1"></div>
      <div class="auth-decoration-circle auth-circle-2"></div>
      <div class="auth-decoration-circle auth-circle-3"></div>
      <div class="floating-particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js?v=public-auth-session-v4"></script>
  <script src="auth-client.js?v=public-auth-session-v3"></script>
  <script src="synapse-selects.js?v=synapse-selects-v3"></script>
  <script src="landing-auth.js?v=supabase-signup-backend-v6"></script>
</body>
</html>
