<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Account | Synapse</title>
  <meta name="description" content="Complete email verification for your Synapse study workspace." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#4a7cff" />
  <meta property="og:title" content="Verify Account | Synapse" />
  <meta property="og:description" content="Finish your Synapse account verification." />
  <meta property="og:image" content="/logos/synapse.png" />
  <meta name="twitter:card" content="summary" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="apple-touch-icon" href="/logos/synapse.png">
  <link rel="stylesheet" href="landing-auth.css?v=supabase-signup-v5">
</head>
<body class="auth-page verify-page">
  <div class="auth-container">
    <div class="auth-card verify-card">
      <a href="login.html" class="auth-back-link">
        <i class="bi bi-arrow-left"></i>
        Back to login
      </a>

      <div class="auth-header verify-header">
        <img src="/logos/synapse.png" alt="Synapse" class="auth-logo">
        <div class="verify-orb" aria-hidden="true">
          <i class="bi bi-shield-check"></i>
        </div>
        <h1 id="verifyTitle">Verifying your account</h1>
        <p id="verifySubtitle">Synapse is checking your secure confirmation link.</p>
      </div>

      <div class="verify-status verify-status-loading" id="verifyStatus" data-testid="verify-status" role="status" aria-live="polite">
        <div class="verify-status-icon">
          <i class="bi bi-arrow-repeat"></i>
        </div>
        <div>
          <strong>Finishing secure verification...</strong>
          <span>This usually takes a second.</span>
        </div>
      </div>

      <div class="verify-steps" aria-label="Verification progress">
        <div class="verify-step is-complete" data-verify-step="account">
          <i class="bi bi-check"></i>
          <span>Account created</span>
        </div>
        <div class="verify-step" data-verify-step="email">
          <i class="bi bi-envelope-check"></i>
          <span>Email verified</span>
        </div>
        <div class="verify-step" data-verify-step="workspace">
          <i class="bi bi-stars"></i>
          <span>Workspace ready</span>
        </div>
      </div>

      <div class="verify-actions">
        <a href="index.html" class="landing-btn landing-btn-primary landing-btn-block" id="openWorkspaceButton" data-testid="verify-open-workspace">
          <i class="bi bi-arrow-right-circle"></i>
          <span>Open Workspace</span>
        </a>
        <a href="signup.html" class="landing-btn landing-btn-outline landing-btn-block" id="verifySignupButton">
          <i class="bi bi-person-plus"></i>
          <span>Create another account</span>
        </a>
      </div>

      <div class="auth-footer">
        <p>Already verified? <a href="login.html" class="auth-link">Login to Synapse</a></p>
      </div>
    </div>

    <div class="auth-decoration">
      <div class="auth-decoration-circle auth-circle-1"></div>
      <div class="auth-decoration-circle auth-circle-2"></div>
      <div class="auth-decoration-circle auth-circle-3"></div>
      <div class="floating-particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js?v=public-auth-session-v3"></script>
  <script src="auth-client.js?v=public-auth-session-v3"></script>
  <script src="verify-auth.js?v=supabase-verify-v1"></script>
</body>
</html>
