<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse Focus Room</title>
  <meta name="description" content="A dedicated Synapse Focus Room for scene-based Pomodoro study, flashcards, quizzes, AI tutor chat, and session history." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#0a111f" />
  <script src="theme-bootstrap.js?v=theme-system-v1"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="apple-touch-icon" href="/logos/synapse.png">
  <link rel="stylesheet" href="style.css?v=loading-history-v1">
  <link rel="stylesheet" href="styles/09-focus-room.css?v=focus-room-glass-v8">
  <link rel="stylesheet" href="styles/00-theme.css?v=theme-system-v1">
</head>
<body class="focus-room-standalone" data-focus-room-version="focus-room-glass-v8">
  <main id="focusRoomRoot">
    <h1 id="focusRoomFallbackTitle">Synapse Focus Room</h1>
  </main>
  <script src="config.js?v=public-auth-session-v3"></script>
  <script type="module">
    if (window.SYNAPSE_FOCUS_ROOM_ENABLED === true) {
      import("./src/focus-room/static-compatible-loader.js?v=focus-room-loader-v7")
        .catch(error => {
          console.error("Synapse Focus Room failed to start:", error);
          window.location.replace("index.html");
        });
    } else {
      window.location.replace("index.html");
    }
  </script>
</body>
</html>
