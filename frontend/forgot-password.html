<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Synapse</title>
  <meta name="description" content="Send a Synapse password reset link for your study workspace." />
  <meta name="robots" content="noindex,follow" />
  <meta name="theme-color" content="#4a7cff" />
  <meta property="og:title" content="Reset Password | Synapse" />
  <meta property="og:description" content="Reset access to your Synapse study workspace." />
  <meta property="og:image" content="/logos/synapse.png" />
  <meta name="twitter:card" content="summary" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="apple-touch-icon" href="/logos/synapse.png">
  <link rel="stylesheet" href="landing-auth.css?v=supabase-password-reset-v1">
  <link rel="stylesheet" href="synapse-selects.css?v=synapse-selects-v2">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <a href="login.html" class="auth-back-link">
        <i class="bi bi-arrow-left"></i>
        Back to login
      </a>
      
      <div class="auth-header">
        <img src="/logos/synapse.png" alt="Synapse" class="auth-logo">
        <h1>Reset your password</h1>
        <p>Send a secure reset link to the email connected to your Synapse workspace.</p>
      </div>
      
      <form class="auth-form" id="forgotPasswordForm">
        <div class="auth-form-group">
          <label for="resetEmail" class="auth-label">
            <i class="bi bi-envelope"></i>
            Email Address
          </label>
          <input 
            type="email" 
            id="resetEmail" 
            name="email" 
            class="auth-input" 
            placeholder="your.email@example.com"
            autocomplete="email"
            required
            aria-describedby="resetEmailError"
            data-testid="reset-email-input"
          />
          <div class="auth-error" id="resetEmailError" aria-live="polite"></div>
        </div>
        
        <button type="submit" class="landing-btn landing-btn-primary landing-btn-block" data-testid="reset-submit-button">
          <i class="bi bi-send"></i>
          <span>Send Reset Link</span>
          <div class="auth-spinner" id="resetSpinner"></div>
        </button>
      </form>
      
      <div class="auth-success" id="resetSuccess" role="status" aria-live="polite" data-testid="reset-success">
        <div class="auth-success-icon">
          <i class="bi bi-check-circle"></i>
        </div>
        <h3>Reset link requested</h3>
        <p>If this email belongs to a Synapse account, Synapse will send a secure reset link. Open it to choose a new password.</p>
        <div class="auth-success-actions" id="resetSuccessActions"></div>
        <a href="login.html" class="landing-btn landing-btn-outline landing-btn-block">
          <i class="bi bi-arrow-left"></i>
          Back to Login
        </a>
      </div>
      
      <div class="auth-footer">
        <p>Remember your password? <a href="login.html" class="auth-link">Login</a></p>
      </div>
    </div>
    
    <div class="auth-decoration">
      <div class="auth-decoration-circle auth-circle-1"></div>
      <div class="auth-decoration-circle auth-circle-2"></div>
      <div class="auth-decoration-circle auth-circle-3"></div>
      <div class="floating-particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js?v=runtime-config-v1"></script>
  <script src="auth-client.js?v=supabase-password-reset-v1"></script>
  <script src="synapse-selects.js?v=synapse-selects-v2"></script>
  <script src="landing-auth.js?v=supabase-password-reset-v1"></script>
</body>
</html>
