<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Synapse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="/logos/synapse.png">
  <link rel="stylesheet" href="landing-auth.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <a href="login.html" class="auth-back-link">
        <i class="bi bi-arrow-left"></i>
        Back to login
      </a>
      
      <div class="auth-header">
        <img src="/logos/synapse.png" alt="Synapse" class="auth-logo">
        <h1>Reset your password</h1>
        <p>Enter your email and we'll send you a reset link</p>
      </div>
      
      <form class="auth-form" id="forgotPasswordForm">
        <div class="auth-form-group">
          <label for="resetEmail" class="auth-label">
            <i class="bi bi-envelope"></i>
            Email Address
          </label>
          <input 
            type="email" 
            id="resetEmail" 
            name="email" 
            class="auth-input" 
            placeholder="your.email@example.com"
            required
            data-testid="reset-email-input"
          />
          <div class="auth-error" id="resetEmailError"></div>
        </div>
        
        <button type="submit" class="landing-btn landing-btn-primary landing-btn-block" data-testid="reset-submit-button">
          <i class="bi bi-send"></i>
          <span>Send Reset Link</span>
          <div class="auth-spinner" id="resetSpinner"></div>
        </button>
      </form>
      
      <div class="auth-success" id="resetSuccess">
        <div class="auth-success-icon">
          <i class="bi bi-check-circle"></i>
        </div>
        <h3>Check your email</h3>
        <p>We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>
        <a href="login.html" class="landing-btn landing-btn-outline landing-btn-block">
          <i class="bi bi-arrow-left"></i>
          Back to Login
        </a>
      </div>
      
      <div class="auth-footer">
        <p>Remember your password? <a href="login.html" class="auth-link">Login</a></p>
      </div>
    </div>
    
    <div class="auth-decoration">
      <div class="auth-decoration-circle auth-circle-1"></div>
      <div class="auth-decoration-circle auth-circle-2"></div>
      <div class="auth-decoration-circle auth-circle-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="landing-auth.js"></script>
</body>
</html>
