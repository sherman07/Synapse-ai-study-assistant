  <script>
    // Relative workspace assets break when the URL is exactly `/frontend`
    // (no trailing slash). Canonicalize before any relative scripts/styles load.
    (function () {
      try {
        if ((window.location.pathname || "") === "/frontend") {
          window.location.replace("/frontend/" + window.location.search + window.location.hash);
        }
      } catch (_) {}
    })();
  </script>
  <script src="theme-bootstrap.js?v=theme-system-v1"></script>
